name: C++ build and contract tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ubuntu-26-cuda-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build full image and run non-GPU tests
        # The full build (not just the build stage) also assembles the
        # runtime stage, so a runtime library missing from the staged
        # closure fails here instead of at deploy time.
        run: docker build --progress=plain .
